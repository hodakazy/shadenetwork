<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shade Network — Staff Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --gold: #ffd800;
      --bg: #080808;
      --bg2: #0f0f0f;
      --bg3: #161616;
      --bg4: #1e1e1e;
      --bg5: #252525;
      --border: rgba(255,216,0,0.12);
      --border2: rgba(255,255,255,0.07);
      --text: #efefef;
      --muted: #666;
      --muted2: #999;
      --radius: 8px;
      --green: #22c55e;
      --red: #ef4444;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden; -webkit-font-smoothing: antialiased;
    }

    /* ── LOGIN SCREEN ── */
    #loginScreen {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      width: 100%; max-width: 380px;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 16px; padding: 44px 40px;
      position: relative; overflow: hidden;
    }
    .login-box::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: var(--gold);
    }
    .login-logo {
      font-family: 'Bebas Neue', sans-serif; font-size: 24px; letter-spacing: 4px;
      color: var(--gold); margin-bottom: 6px;
    }
    .login-sub { font-size: 12px; color: var(--muted2); font-family: 'Space Mono', monospace; letter-spacing: 1px; margin-bottom: 36px; }
    .login-label { font-size: 11px; color: var(--muted2); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; display: block; }
    .login-inp {
      width: 100%; background: var(--bg3); border: 1px solid var(--border2);
      border-radius: var(--radius); color: var(--text);
      font-family: 'Space Mono', monospace; font-size: 13px;
      padding: 12px 14px; outline: none; transition: border-color 0.2s;
      letter-spacing: 2px;
    }
    .login-inp:focus { border-color: rgba(255,216,0,0.4); }
    .login-inp::placeholder { letter-spacing: 1px; color: var(--muted); }
    .login-btn {
      width: 100%; margin-top: 20px; padding: 13px;
      background: var(--gold); color: #000; border: none;
      border-radius: var(--radius); font-family: 'DM Sans', sans-serif;
      font-weight: 700; font-size: 14px; cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }
    .login-btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .login-err {
      margin-top: 12px; font-size: 12px; color: var(--red);
      font-family: 'Space Mono', monospace; text-align: center;
      opacity: 0; transition: opacity 0.2s;
    }
    .login-err.show { opacity: 1; }

    /* ── DASHBOARD ── */
    #dashboard { display: none; height: 100vh; flex-direction: column; }
    #dashboard.visible { display: flex; }

    .dash-top {
      height: 52px; background: var(--bg2); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px; flex-shrink: 0;
    }
    .dash-logo { font-family: 'Bebas Neue', sans-serif; font-size: 18px; letter-spacing: 4px; color: var(--gold); }
    .dash-logo span { color: rgba(255,255,255,0.3); }
    .dash-status {
      display: flex; align-items: center; gap: 8px;
      font-size: 11px; font-family: 'Space Mono', monospace; color: var(--muted2);
    }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: blink 2s infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .dash-logout {
      background: none; border: 1px solid var(--border2); color: var(--muted);
      font-size: 11px; font-family: 'Space Mono', monospace; padding: 5px 12px;
      border-radius: 6px; cursor: pointer; transition: color 0.2s, border-color 0.2s;
    }
    .dash-logout:hover { color: var(--red); border-color: rgba(239,68,68,0.3); }

    .dash-body { display: flex; flex: 1; overflow: hidden; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: 280px; flex-shrink: 0;
      background: var(--bg2); border-right: 1px solid var(--border2);
      display: flex; flex-direction: column; overflow: hidden;
    }
    .sidebar-head {
      padding: 18px 18px 12px;
      border-bottom: 1px solid var(--border2); flex-shrink: 0;
    }
    .sidebar-title {
      font-size: 10px; font-family: 'Space Mono', monospace;
      color: var(--muted2); letter-spacing: 2px; text-transform: uppercase;
      margin-bottom: 10px;
    }
    .sidebar-stats { display: flex; gap: 10px; }
    .stat-pill {
      flex: 1; background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 6px; padding: 8px 10px; text-align: center;
    }
    .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 22px; color: var(--gold); line-height: 1; }
    .stat-lbl { font-size: 9px; color: var(--muted); font-family: 'Space Mono', monospace; letter-spacing: 1px; }
    .stat-pill.open-stat .stat-num { color: var(--green); }

    .conv-list { flex: 1; overflow-y: auto; padding: 8px; }
    .conv-list::-webkit-scrollbar { width: 2px; }
    .conv-list::-webkit-scrollbar-thumb { background: var(--border2); }

    .conv-item {
      padding: 12px 12px; border-radius: 10px; cursor: pointer;
      transition: background 0.15s; margin-bottom: 4px;
      border: 1px solid transparent; position: relative;
    }
    .conv-item:hover { background: var(--bg3); }
    .conv-item.active { background: var(--bg3); border-color: rgba(255,216,0,0.2); }
    .conv-item-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 4px; }
    .conv-name { font-size: 13px; font-weight: 600; }
    .conv-time { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; }
    .conv-preview { font-size: 11px; color: var(--muted2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }
    .conv-unread {
      position: absolute; top: 10px; right: 10px;
      background: var(--gold); color: #000; font-size: 9px; font-weight: 700;
      font-family: 'Space Mono', monospace; width: 18px; height: 18px;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
    }
    .conv-status-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      display: inline-block; margin-right: 5px;
    }
    .conv-status-dot.online { background: var(--green); }
    .conv-status-dot.offline { background: var(--muted); }

    .no-convs {
      padding: 40px 20px; text-align: center;
      font-size: 12px; color: var(--muted); font-family: 'Space Mono', monospace;
      line-height: 1.8;
    }

    /* ── MAIN CHAT ── */
    .chat-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .chat-header {
      padding: 14px 24px; border-bottom: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0; background: var(--bg2);
    }
    .chat-header-user { display: flex; align-items: center; gap: 12px; }
    .chat-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: var(--bg4); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center; font-size: 15px;
    }
    .chat-uname { font-size: 14px; font-weight: 600; }
    .chat-usub { font-size: 11px; color: var(--muted2); font-family: 'Space Mono', monospace; }

    .close-btn {
      background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25);
      color: var(--red); font-size: 11px; font-family: 'Space Mono', monospace;
      padding: 6px 14px; border-radius: 6px; cursor: pointer;
      transition: background 0.2s;
    }
    .close-btn:hover { background: rgba(239,68,68,0.16); }

    .chat-msgs {
      flex: 1; overflow-y: auto; padding: 24px;
      display: flex; flex-direction: column; gap: 14px;
    }
    .chat-msgs::-webkit-scrollbar { width: 2px; }
    .chat-msgs::-webkit-scrollbar-thumb { background: var(--border2); }

    /* messages */
    .msg-row { display: flex; gap: 10px; max-width: 72%; }
    .msg-row.staff-msg { align-self: flex-end; flex-direction: row-reverse; }
    .msg-row.user-msg  { align-self: flex-start; }
    .msg-row.system-msg { align-self: center; max-width: 100%; }

    .msg-ava {
      width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0;
      background: var(--bg4); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center; font-size: 13px;
    }
    .msg-row.staff-msg .msg-ava { background: rgba(255,216,0,0.15); border-color: rgba(255,216,0,0.2); }

    .msg-content { display: flex; flex-direction: column; gap: 3px; }
    .msg-sender { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; }
    .msg-row.staff-msg .msg-sender { text-align: right; color: rgba(255,216,0,0.6); }

    .msg-bubble {
      background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 12px; padding: 10px 14px;
      font-size: 13px; line-height: 1.55;
    }
    .msg-row.staff-msg .msg-bubble {
      background: rgba(255,216,0,0.08);
      border-color: rgba(255,216,0,0.2);
    }
    .system-bubble {
      background: rgba(255,255,255,0.03); border: 1px solid var(--border2);
      border-radius: 20px; padding: 5px 14px;
      font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace;
      text-align: center;
    }

    .chat-input-area {
      padding: 16px 24px; border-top: 1px solid var(--border2);
      background: var(--bg2); flex-shrink: 0;
    }
    .chat-input-row { display: flex; gap: 10px; align-items: flex-end; }
    .chat-inp {
      flex: 1; background: var(--bg3); border: 1px solid var(--border2);
      border-radius: 10px; color: var(--text);
      font-family: 'DM Sans', sans-serif; font-size: 13px;
      padding: 11px 14px; outline: none; resize: none;
      transition: border-color 0.2s; min-height: 42px; max-height: 120px;
      line-height: 1.5;
    }
    .chat-inp:focus { border-color: rgba(255,216,0,0.3); }
    .chat-inp::placeholder { color: var(--muted); }
    .send-btn {
      width: 42px; height: 42px; background: var(--gold); border: none;
      border-radius: 10px; cursor: pointer; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
      transition: transform 0.15s, opacity 0.2s;
    }
    .send-btn:hover { transform: scale(1.07); }
    .send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    .send-btn svg { width: 16px; height: 16px; color: #000; }

    /* empty state */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      color: var(--muted); text-align: center; padding: 40px;
    }
    .empty-icon { font-size: 48px; opacity: 0.3; }
    .empty-title { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; color: var(--muted); }
    .empty-sub { font-size: 12px; font-family: 'Space Mono', monospace; color: var(--muted); line-height: 1.8; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">SHADE<span>NET</span></div>
    <div class="login-sub">// STAFF DASHBOARD</div>
    <label class="login-label" for="staffKey">Access Key</label>
    <input class="login-inp" id="staffKey" type="password" placeholder="Enter staff key..." autocomplete="off"
      onkeydown="if(event.key==='Enter') attemptLogin()" />
    <button class="login-btn" onclick="attemptLogin()">Enter Dashboard</button>
    <div class="login-err" id="loginErr">Invalid access key. Try again.</div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="dash-top">
    <div class="dash-logo">SHADE<span>NET</span> — STAFF</div>
    <div class="dash-status">
      <div class="status-dot"></div>
      <span id="staffName">Staff Online</span>
    </div>
    <button class="dash-logout" onclick="logout()">Sign Out</button>
  </div>

  <div class="dash-body">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-head">
        <div class="sidebar-title">Support Queue</div>
        <div class="sidebar-stats">
          <div class="stat-pill open-stat">
            <div class="stat-num" id="openCount">0</div>
            <div class="stat-lbl">Open</div>
          </div>
          <div class="stat-pill">
            <div class="stat-num" id="totalCount">0</div>
            <div class="stat-lbl">Total</div>
          </div>
        </div>
      </div>
      <div class="conv-list" id="convList">
        <div class="no-convs">No active chats yet.<br>Waiting for users...</div>
      </div>
    </div>

    <!-- Chat Area -->
    <div class="chat-main" id="chatMain">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">💬</div>
        <div class="empty-title">No Chat Selected</div>
        <div class="empty-sub">Select a conversation from the<br>sidebar to start responding.</div>
      </div>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, set, onDisconnect, get }
    from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCECszUZhki6708YXJh-93mpDd7SbQKwGU",
    authDomain: "shade-nt7.firebaseapp.com",
    databaseURL: "https://shade-nt7-default-rtdb.firebaseio.com",
    projectId: "shade-nt7",
    storageBucket: "shade-nt7.firebasestorage.app",
    messagingSenderId: "194556601671",
    appId: "1:194556601671:web:b39f92988d33e53a5a9862"
  };

  const STAFF_KEY = "9aEeQZrucLepNwFze7bv4Xk";
  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  let activeSession = null;
  let sessionListeners = {};

  // ── LOGIN ──
  window.attemptLogin = function() {
    const val = document.getElementById('staffKey').value.trim();
    const err = document.getElementById('loginErr');
    if (val === STAFF_KEY) {
      document.getElementById('loginScreen').style.display = 'none';
      const dash = document.getElementById('dashboard');
      dash.style.display = 'flex';
      dash.classList.add('visible');
      initDashboard();
    } else {
      err.classList.add('show');
      document.getElementById('staffKey').value = '';
      setTimeout(() => err.classList.remove('show'), 3000);
    }
  };

  window.logout = function() {
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('staffKey').value = '';
    activeSession = null;
  };

  // ── INIT DASHBOARD ──
  function initDashboard() {
    const sessionsRef = ref(db, 'sessions');
    onValue(sessionsRef, snap => {
      const data = snap.val() || {};
      renderSidebar(data);
    });
  }

  function renderSidebar(sessions) {
    const list = document.getElementById('convList');
    const keys = Object.keys(sessions);
    document.getElementById('totalCount').textContent = keys.length;
    const open = keys.filter(k => sessions[k].status !== 'closed');
    document.getElementById('openCount').textContent = open.length;

    if (keys.length === 0) {
      list.innerHTML = '<div class="no-convs">No active chats yet.<br>Waiting for users...</div>';
      return;
    }

    // Sort: open first, then by last message time desc
    keys.sort((a, b) => {
      const sa = sessions[a], sb = sessions[b];
      if (sa.status !== 'closed' && sb.status === 'closed') return -1;
      if (sa.status === 'closed' && sb.status !== 'closed') return 1;
      return (sb.lastTs || 0) - (sa.lastTs || 0);
    });

    list.innerHTML = '';
    keys.forEach(sid => {
      const s = sessions[sid];
      const div = document.createElement('div');
      div.className = 'conv-item' + (sid === activeSession ? ' active' : '');
      div.dataset.sid = sid;

      const unread = s.unreadStaff || 0;
      const isOnline = s.online;
      const ts = s.lastTs ? timeAgo(s.lastTs) : '';

      div.innerHTML = `
        <div class="conv-item-top">
          <div class="conv-name">
            <span class="conv-status-dot ${isOnline ? 'online' : 'offline'}"></span>
            ${esc(s.username || 'Anonymous')}
          </div>
          <div class="conv-time">${ts}</div>
        </div>
        <div class="conv-preview">${esc(s.lastMsg || 'No messages yet')}</div>
        ${unread > 0 && sid !== activeSession ? `<div class="conv-unread">${unread}</div>` : ''}
      `;
      div.onclick = () => openSession(sid, s);
      list.appendChild(div);
    });
  }

  // ── OPEN SESSION ──
  function openSession(sid, sessionData) {
    activeSession = sid;
    // Clear unread
    set(ref(db, `sessions/${sid}/unreadStaff`), 0);

    const main = document.getElementById('chatMain');
    main.innerHTML = `
      <div class="chat-header">
        <div class="chat-header-user">
          <div class="chat-avatar">👤</div>
          <div>
            <div class="chat-uname">${esc(sessionData.username || 'Anonymous')}</div>
            <div class="chat-usub" id="activeSubtitle">Loading...</div>
          </div>
        </div>
        <button class="close-btn" onclick="window.closeSession('${sid}')">✕ Close Chat</button>
      </div>
      <div class="chat-msgs" id="activeMsgs"></div>
      <div class="chat-input-area" id="activeInputArea">
        <div class="chat-input-row">
          <textarea class="chat-inp" id="staffInp" placeholder="Reply to ${esc(sessionData.username || 'user')}..."
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();window.staffSend('${sid}')}"
            oninput="this.style.height='42px';this.style.height=Math.min(this.scrollHeight,120)+'px'"></textarea>
          <button class="send-btn" onclick="window.staffSend('${sid}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
      </div>
    `;

    // Listen to messages
    const msgsRef = ref(db, `sessions/${sid}/messages`);
    if (sessionListeners[sid]) sessionListeners[sid]();
    const unsub = onValue(msgsRef, snap => {
      const msgs = snap.val() || {};
      renderMessages(msgs, sid);
    });
    sessionListeners[sid] = unsub;

    // Listen to session status for subtitle
    const sessRef = ref(db, `sessions/${sid}`);
    onValue(sessRef, snap => {
      const d = snap.val();
      if (!d) return;
      const el = document.getElementById('activeSubtitle');
      if (el) el.textContent = d.online ? '🟢 Online now' : '⚫ Offline';
    });

    // Highlight in sidebar
    document.querySelectorAll('.conv-item').forEach(el => {
      el.classList.toggle('active', el.dataset.sid === sid);
      // Remove unread badge
      if (el.dataset.sid === sid) {
        const badge = el.querySelector('.conv-unread');
        if (badge) badge.remove();
      }
    });
  }

  function renderMessages(msgs, sid) {
    const container = document.getElementById('activeMsgs');
    if (!container) return;
    const keys = Object.keys(msgs).sort((a, b) => (msgs[a].ts || 0) - (msgs[b].ts || 0));
    const wasAtBottom = container.scrollHeight - container.scrollTop - container.clientHeight < 60;
    container.innerHTML = '';
    keys.forEach(k => {
      const m = msgs[k];
      const isStaff = m.role === 'staff';
      const isSystem = m.role === 'system';
      if (isSystem) {
        const row = document.createElement('div');
        row.className = 'msg-row system-msg';
        row.innerHTML = `<div class="system-bubble">${esc(m.text)}</div>`;
        container.appendChild(row);
        return;
      }
      const row = document.createElement('div');
      row.className = `msg-row ${isStaff ? 'staff-msg' : 'user-msg'}`;
      row.innerHTML = `
        <div class="msg-ava">${isStaff ? '🛡️' : '👤'}</div>
        <div class="msg-content">
          <div class="msg-sender">${isStaff ? 'Staff' : esc(m.username || 'User')} · ${m.ts ? timeAgo(m.ts) : ''}</div>
          <div class="msg-bubble">${esc(m.text)}</div>
        </div>
      `;
      container.appendChild(row);
    });
    if (wasAtBottom) container.scrollTop = container.scrollHeight;
  }

  window.staffSend = async function(sid) {
    const inp = document.getElementById('staffInp');
    if (!inp) return;
    const text = inp.value.trim();
    if (!text) return;
    inp.value = ''; inp.style.height = '42px';

    const msgsRef = ref(db, `sessions/${sid}/messages`);
    const msg = { role: 'staff', text, ts: Date.now() };
    await push(msgsRef, msg);

    // Update session meta
    await set(ref(db, `sessions/${sid}/lastMsg`), text);
    await set(ref(db, `sessions/${sid}/lastTs`), Date.now());
    await set(ref(db, `sessions/${sid}/status`), 'active');

    // Increment unread for user
    const snap = await get(ref(db, `sessions/${sid}/unreadUser`));
    await set(ref(db, `sessions/${sid}/unreadUser`), (snap.val() || 0) + 1);
  };

  window.closeSession = async function(sid) {
    if (!confirm('Close this support chat?')) return;
    const msgsRef = ref(db, `sessions/${sid}/messages`);
    await push(msgsRef, { role: 'system', text: 'Chat closed by staff.', ts: Date.now() });
    await set(ref(db, `sessions/${sid}/status`), 'closed');
    activeSession = null;
    document.getElementById('chatMain').innerHTML = `
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">✅</div>
        <div class="empty-title">Chat Closed</div>
        <div class="empty-sub">Select another conversation<br>from the sidebar.</div>
      </div>`;
  };

  // ── HELPERS ──
  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function timeAgo(ts) {
    const s = Math.floor((Date.now() - ts) / 1000);
    if (s < 60) return 'just now';
    if (s < 3600) return Math.floor(s/60) + 'm ago';
    if (s < 86400) return Math.floor(s/3600) + 'h ago';
    return Math.floor(s/86400) + 'd ago';
  }
</script>
